model:
  name: "Qwen/Qwen3.5-9B"
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"     # Q4_K_M-equivalent in bitsandbytes
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  target_modules: "all-linear"
  lora_dropout: 0.05
  bias: "none"
  use_dora: false                  # DoRA disabled — too slow with 4-bit NF4; re-enable for final runs if needed
  task_type: "CAUSAL_LM"

training:
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 1
  max_grad_norm: 1.0
  optimizer: "paged_adamw_32bit"
  gradient_checkpointing: true
  bf16: true
  logging_steps: 5
  save_strategy: "no"             # Checkpoints managed manually by experiment

data:
  dataset_name: "openai/gsm8k"
  dataset_config: "main"
  subset_size: 500
  train_ratio: 0.8
  max_seq_length: 512
  seed: 42

experiment:
  num_iterations: 20
  hard_negative_injection_interval: 5  # Every N iters inject hard negatives
  hard_negative_ratio: 0.5             # 50% of batch from hard negatives
  confidence_threshold: 0.7            # self_score > threshold → "high confidence"
  checkpoint_interval: 5
  output_dir: "models"
  log_dir: "logs"

wandb:
  project: "rsi-verification-collapse"
  entity: null                    # Set to your W&B username if needed
  tags: ["qwen3.5-9b-official", "gsm8k", "qlora", "dora", "verification-collapse"]
