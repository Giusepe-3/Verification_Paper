model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  quantization:
    load_in_4bit: false
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  target_modules: "all-linear"
  lora_dropout: 0.05
  bias: "none"
  use_dora: false
  task_type: "CAUSAL_LM"

training:
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16  # effective batch = 16
  num_train_epochs: 1
  max_grad_norm: 1.0
  optimizer: "adamw"
  gradient_checkpointing: true
  bf16: true
  logging_steps: 5
  save_strategy: "no"
  gen_batch_size: 16

data:
  dataset_name: "lighteval/MATH"
  dataset_config: "all"
  level_filter: [3, 4, 5]
  subset_size: 250        # 200 train / 50 val
  train_ratio: 0.8
  max_seq_length: 1024
  max_new_tokens: 512
  seed: 42

experiment:
  num_iterations: 20
  hard_negative_injection_interval: 9999  # effectively disabled — pure baseline
  hard_negative_ratio: 0.0
  confidence_threshold: 0.7
  checkpoint_interval: 5
  output_dir: "models/baseline"
  log_dir: "logs/baseline"

wandb:
  project: "rsi-verification-collapse"
  entity: null
  tags: ["qwen2.5-7b-instruct", "math-l3-5", "lora", "baseline", "no-injection"]
