model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  target_modules: "all-linear"
  lora_dropout: 0.05
  bias: "none"
  use_dora: false
  task_type: "CAUSAL_LM"

training:
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8   # effective batch = 32 (same as before, fewer steps)
  num_train_epochs: 1
  max_grad_norm: 1.0
  optimizer: "adamw"
  gradient_checkpointing: true
  bf16: true
  logging_steps: 5
  save_strategy: "no"
  gen_batch_size: 32

data:
  dataset_name: "hendrycks/competition_math"
  dataset_config: null
  level_filter: [3, 4, 5]
  subset_size: 250        # same as baseline for direct comparison
  train_ratio: 0.8
  max_seq_length: 1024
  max_new_tokens: 512
  seed: 42

experiment:
  num_iterations: 20
  hard_negative_injection_interval: 3   # inject every 3 iterations (iters 3, 6, 9)
  hard_negative_ratio: 0.5
  confidence_threshold: 0.7
  checkpoint_interval: 5
  output_dir: "models/injection"
  log_dir: "logs/injection"

wandb:
  project: "rsi-verification-collapse"
  entity: null
  tags: ["qwen2.5-7b-instruct", "math-l3-5", "lora", "injection", "adversarial", "h100-pcie"]
